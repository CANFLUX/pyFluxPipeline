    SW_IN_NARR:
      variableName: SW_IN_NARR
      linearInterpLimit: 6
    TA_NARR:
      variableName: TA_NARR
      linearInterpLimit: 6
    RH_NARR:
      variableName: RH_NARR
      linearInterpLimit: 6
    PA_NARR:
      variableName: PA_NARR
      linearInterpLimit: 6
    P_NARR:
      variableName: P_NARR
