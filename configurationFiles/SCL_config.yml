      - -10
      - 25
    TS_1_2_1:
      variableName: TS_1_2_1
      units: C
      inputFiles:
        SSM_TS.Temp_C_LGR_S_N_20750528_SEN_S_N_20750528_LBL_25: *SSM_TS.inputDates
