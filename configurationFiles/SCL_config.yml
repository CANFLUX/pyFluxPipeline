      - 0
      - 1
    H2O_signal:
      variableName: H2O_signal
      units: umol mol-1
      inputFiles:
        Flux2024.h2o_signal_mean: *Flux2024.inputDates
        Flux2025.h2o_signal_mean: *Flux2025.inputDates
    FCOC2:
      variableName: FCO2
      units: umol m-2 s-1
      inputFiles:
        Flux2024.co2_flux: *Flux2024.inputDates
        Flux2025.co2_flux: *Flux2025.inputDates
      minMax:
      - -15
      - 5
      dependent:
      - FCO2_QC
      - CO2_signal
      - ustar_filter
      - wind_dir_flag
    FCO2_QC:
      variableName: FCO2_QC
      units: arb
      inputFiles:
        Flux2024.qc_co2_flux: *Flux2024.inputDates
        Flux2025.qc_co2_flux: *Flux2025.inputDates
