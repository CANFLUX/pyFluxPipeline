Metadata:
  AmerifluxID:
  lat: 69.2264167
  long: -135.2519067
  siteID: SCL
  startYear:
  stopYear:
  timezone:
rawData:
  preEvaluate: |-
    #Codespace for preEvaluate corrections
    # Convert AGC
    rawData["Flux2024.co2_signal_mean"] = (100-(rawData["Flux2024.mean_value_AGC_LI-7500"]-rawData["Flux2024.mean_value_AGC_LI-7500"].min()))
    rawData["Flux2024.h2o_signal_mean"] = (100-(rawData["Flux2024.mean_value_AGC_LI-7500"]-rawData["Flux2024.mean_value_AGC_LI-7500"].min()))
    rawData["Flux2025.co2_signal_mean"] *= 100
    rawData["Flux2025.h2o_signal_mean"] *= 100
    # 15 degree missalignment in record (incorrect declination used originally)
    offset = -24.5
    rawData["Flux2024.wind_dir"] = rawData["Flux2024.wind_dir"]+offset
    rawData.loc[rawData["Flux2024.wind_dir"]>360,"Flux2024.wind_dir"] -= 360
    rawData.loc[rawData["Flux2024.wind_dir"]<0,"Flux2024.wind_dir"] += 360
    rawData["Flux2025.wind_dir"] = rawData["Flux2025.wind_dir"]+offset
    rawData.loc[rawData["Flux2025.wind_dir"]>360,"Flux2025.wind_dir"] -= 360
    rawData.loc[rawData["Flux2025.wind_dir"]<0,"Flux2025.wind_dir"] += 360
    bearing = 8.5
    rawData["Flux2024.wind_dir_flag"] = rawData["Flux2024.wind_dir"].copy()
    rawData.loc[((rawData["Flux2024.wind_dir_flag"]<bearing+180+30)&(rawData["Flux2024.wind_dir_flag"]>bearing+180-30)),"Flux2024.wind_dir_flag"] = np.nan
    rawData["Flux2025.wind_dir_flag"] = rawData["Flux2025.wind_dir"].copy()
    rawData.loc[((rawData["Flux2025.wind_dir_flag"]<bearing+180+30)&(rawData["Flux2025.wind_dir_flag"]>bearing+180-30)),"Flux2025.wind_dir_flag"] = np.nan
  Met2024: &Met2024.inputDates
  - '2024-07-20T21:00:00+00:00'
  - '2024-09-13T00:30:00+00:00'
  MetWx2024: &MetWx2024.inputDates
  - '2024-09-13T22:30:00+00:00'
  - '2025-06-19T17:30:00+00:00'
  Flux2024: &Flux2024.inputDates
  - '2024-07-25T03:30:00+00:00'
  - '2024-09-13T00:30:00+00:00'
  Met2025: &Met2025.inputDates
  - '2025-06-05T23:00:00+00:00'
  - '2026-04-11T00:00:00+00:00'
  Flux2025: &Flux2025.inputDates
  - '2025-08-03T03:00:00+00:00'
  - '2025-09-27T18:00:00+00:00'
  SSM_TS: &SSM_TS.inputDates
  - '2024-07-20T21:00:00+00:00'
  - '2025-07-18T16:00:00+00:00'
  NARR: &NARR.inputDates
  - '2024-01-01T00:00:00+00:00'
  - '2026-03-31T21:00:00+00:00'
Processing:
  FirstStage:
    posix_time:
      variableName: posix_time
      units: s
      dtype: int64
      inputFiles:
        Met2024.posix_time: *Met2024.inputDates
        MetWx2024.posix_time: *MetWx2024.inputDates
        Flux2024.posix_time: *Flux2024.inputDates
        Met2025.posix_time: *Met2025.inputDates
        Flux2025.posix_time: *Flux2025.inputDates
        SSM_TS.posix_time: *SSM_TS.inputDates
        NARR.posix_time: *NARR.inputDates
      minMax:
      - -.inf
      - .inf
      clamped_minMax:
      - -.inf
      - .inf
      dependent: []
      linearRescale:
      notes: default time-trace (seconds since unix epoch)
    TA_1_1_1:
      variableName: TA_1_1_1
      units: C
      inputFiles:
        Met2024.AirTC_Avg: *Met2024.inputDates
        MetWx2024.101-AirTC_AVG: *MetWx2024.inputDates
        Met2025.TA_1_1_3: *Flux2025.inputDates
      minMax:
      - -50
      - 50
    TA_NARR:
      variableName: TA_NARR
      units: K
      inputFiles:
        NARR.air_2m: *NARR.inputDates
      minMax:
      - 223.15
      - 323.15
    RH_1_1_1:
      variableName: RH_1_1_1
      units: C
      inputFiles:
        Met2024.RH: *Met2024.inputDates
        MetWx2024.101-RH: *MetWx2024.inputDates
        Met2025.RH_1_1_2: *Flux2025.inputDates
      minMax:
      - -10
      - 110
      clampedMinMax:
      - 0
      - 100
    RH_NARR:
      variableName: RH_NARR
      units: '%'
      inputFiles:
        NARR.rhum_2m: *NARR.inputDates
    SW_IN_1_1_1:
      variableName: SW_IN_1_1_1
      units: Wm-2
      inputFiles:
        Met2024.SlrW_Avg: *Met2024.inputDates
        MetWx2024.101-SlrW_AVG:
        - '2024-09-13T22:30:00+00:00'
        - '2025-03-01T23:30:00+00:00'
        Met2025.SW_IN: *Flux2025.inputDates
    SW_IN_NARR:
      variableName: SW_IN_NARR
      units: Wm-2
      inputFiles:
        NARR.dswrf: *NARR.inputDates
    PA_1_1_1:
      variableName: PA_1_1_1
      units: Pa
      inputFiles:
        Flux2024.air_pressure: *Flux2024.inputDates
        Flux2025.air_pressure: *Flux2025.inputDates
    PA_NARR:
      variableName: PA_NARR
      units: Pa
      inputFiles:
        NARR.pres_sfc: *NARR.inputDates
    P_NARR:
      variableName: P_NARR
      units: Kg/m-2
      inputFiles:
        NARR.apcp: *NARR.inputDates
    ustar:
      variableName: ustar
      units: ms-1
      inputFiles:
        Flux2024.ustar: *Flux2024.inputDates
        Flux2025.ustar: *Flux2025.inputDates
    ustar_filter:
      variableName: ustar_filter
      units: ms-1
      inputFiles:
        Flux2024.ustar: *Flux2024.inputDates
        Flux2025.ustar: *Flux2025.inputDates
      minMax:
      - 0.1
      - 2.0
    WS_1_1_1:
      variableName: WS_1_1_1
      units: ms-1
      inputFiles:
        Flux2024.wind_speed: *Flux2024.inputDates
        Flux2025.wind_speed: *Flux2025.inputDates
    WD_1_1_1:
      variableName: WD_1_1_1
      units: degrees
      inputFiles:
        Flux2024.wind_dir: *Flux2024.inputDates
        Flux2025.wind_dir: *Flux2025.inputDates
    wind_dir_flag:
      variableName: wind_dir_flag
      units: degrees
      inputFiles:
        Flux2024.wind_dir_flag: *Flux2024.inputDates
        Flux2025.wind_dir_flag: *Flux2025.inputDates
    uwind_NARR:
      variableName: uwind_NARR
      units: m s-1
      inputFiles:
        NARR.uwnd_10m: *NARR.inputDates
    vwind_NARR:
      variableName: vwind_NARR
      units: m s-1
      inputFiles:
        NARR.vwnd_10m: *NARR.inputDates
    H:
      variableName: H
      units: W m-2
      inputFiles:
        Flux2024.H: *Flux2024.inputDates
        Flux2025.H: *Flux2025.inputDates
      dependent:
      - H_QC
      - ustar_filter
      - wind_dir_flag
    H_QC:
      variableName: H_QC
      units: arb
      inputFiles:
        Flux2024.qc_H: *Flux2024.inputDates
        Flux2025.qc_H: *Flux2025.inputDates
      minMax:
      - 0
      - 1
    LE:
      variableName: LE
      units: W m-2
      inputFiles:
        Flux2024.LE: *Flux2024.inputDates
        Flux2025.LE: *Flux2025.inputDates
      dependent:
      - LE_QC
      - H2O_signal
      - ustar_filter
      - wind_dir_flag
    LE_QC:
      variableName: LE_QC
      units: arb
      inputFiles:
        Flux2024.qc_LE: *Flux2024.inputDates
        Flux2025.qc_LE: *Flux2025.inputDates
