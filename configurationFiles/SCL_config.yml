    vwind_NARR:
      variableName: vwind_NARR
      units: m s-1
      inputFiles:
        NARR.vwnd_10m: *NARR.inputDates
      linearInterpLimit: 6
    SW_IN_1_1_1:
      variableName: SW_IN_1_1_1
      units: Wm-2
    TA_1_1_1:
      variableName: TA_1_1_1
      units: C
    RH_1_1_1:
